<!doctype html>
<html>
  <head>
    <title>GPS AR Points</title>
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    <script src="https://unpkg.com/aframe-look-at-component@1.0.0/dist/aframe-look-at-component.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
      body {
        margin: 0;
        overflow: hidden;
      }
      .arjs-loader {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.8);
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        z-index: 9999;
      }
    </style>
  </head>
  <body>
    <div class="arjs-loader">Loading AR... Enable GPS & camera.</div>
    <a-scene
      vr-mode-ui="enabled: true"
      arjs="sourceType: webcam; videoTexture: true; debugUIEnabled: true;"
      renderer="antialias: true; alpha: true;"
    >
      <a-entity id="points"></a-entity>
      <a-camera
        gps-new-camera="gpsMinDistance: 5"
        raycaster="objects: .clickable;"
      ></a-camera>
    </a-scene>
    <script>
      window.onload = () => {
        const scene = document.querySelector("a-scene");
        const camera = document.querySelector("[gps-new-camera]");
        const pointsEl = document.getElementById("points");
        let added = false;
        navigator.geolocation.getCurrentPosition(
          (position) => {
            const { latitude, longitude } = position.coords;
            alert(`Current GPS position: ${latitude}, ${longitude}`);
            // Sample GPS points: lat, lon, label (add your own array)
            const gpsPoints = [
              {
                lat: latitude + 0.001,
                lon: longitude,
                label: "Point 1",
                color: "red",
              },
              {
                lat: latitude,
                lon: longitude + 0.001,
                label: "Point 2",
                color: "blue",
              },
              {
                lat: latitude - 0.001,
                lon: longitude,
                label: "Point 3",
                color: "green",
              },
            ];
            camera.addEventListener("gps-camera-update-position", (e) => {
              if (!added) {
                debugger;
                gpsPoints.forEach((point) => {
                  // Compound entity: box + label
                  const entity = document.createElement("a-entity");
                  entity.setAttribute(
                    "gps-new-entity-place",
                    `latitude: ${point.lat}; longitude: ${point.lon}`,
                  );

                  const box = document.createElement("a-box");
                  box.setAttribute("scale", "15 15 15");
                  box.setAttribute("material", { color: point.color });
                  box.setAttribute("position", "0 10 0");
                  box.classList.add("clickable");

                  const text = document.createElement("a-text");
                  text.setAttribute("value", point.label);
                  text.setAttribute("look-at", "[gps-new-camera]");
                  text.setAttribute("scale", "50 50 50");
                  text.setAttribute("align", "center");
                  text.setAttribute("position", "0 30 0");

                  entity.appendChild(box);
                  entity.appendChild(text);
                  pointsEl.appendChild(entity);
                });
                document.querySelector(".arjs-loader").style.display = "none";
                added = true;
              }
            });
          },
          (error) => {
            console.error("Error getting GPS position:", error);
          },

          {
            enableHighAccuracy: true,
            timeout: 5000,
            maximumAge: 0,
          },
        );

        console.log(latitude, longitude);
      };
    </script>
  </body>
</html>
